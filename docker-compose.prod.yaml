version: "3.9"

services:
  frontend:
    image: hikaru20356/frontend:${VERSION}
    volumes:
      - frontend-static:/dist
    command: sh -c "cp -r /usr/src/app/dist/* /dist/"
    expose:
      - "80"

  backend:
    image: hikaru20356/backend:${VERSION}
    env_file:
      - /opt/app/env/backend.env
    depends_on:
      - postgres
    expose:
      - "3000"

  postgres:
    image: postgres:16
    env_file:
      - /opt/app/env/postgres.env
    volumes:
      - postgres-data:/var/lib/postgresql/data

  nginx:
    image: hikaru20356/nginx:${VERSION}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend-static:/usr/share/nginx/html:ro
      - /opt/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres-data:
  frontend-static:
