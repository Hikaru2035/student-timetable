services:
  frontend:
    image: todo-frontend:active
    volumes:
      - frontend-static:/dist
    command: sh -c "cp -r /usr/src/app/dist/* /dist/"
    networks:
      - todo-network

  backend:
    image: todo-backend:active
    env_file:
      - ./backend/.env
    expose:
      - "3000"
    networks:
      - todo-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend-static:/usr/share/nginx/html:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    networks:
      - todo-network

networks:
  todo-network:
    external: true

volumes:
  frontend-static:
