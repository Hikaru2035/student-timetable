apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: dev-cloud-cluster
  region: ap-southeast-1
  version: "1.32"

# Disable Auto Mode explicitly
autoModeConfig:
  enabled: false

# Enable OIDC cleanly (for IRSA)
iam:
  withOIDC: true

# Networking (eksctl-managed VPC)
vpc:
  nat:
    gateway: Single  # cost-aware, stable
  clusterEndpoints:
    publicAccess: true
    privateAccess: false

# Managed node group (classic, predictable)
managedNodeGroups:
  - name: dev-nodes
    instanceType: t3.medium
    desiredCapacity: 2
    minSize: 2
    maxSize: 4
    volumeSize: 20


