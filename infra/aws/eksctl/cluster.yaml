apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: student-timetable-prod
  region: ap-southeast-1
  version: "1.31"

iam:
  withOIDC: true

vpc:
  clusterEndpoints:
    publicAccess: true
    privateAccess: true
  nat:
    gateway: Single

availabilityZones:
  - ap-southeast-1a
  - ap-southeast-1b

managedNodeGroups:
  - name: app-ng
    instanceType: t3.large
    amiFamily: AmazonLinux2023
    desiredCapacity: 2
    minSize: 2
    maxSize: 4
    volumeSize: 40
    privateNetworking: true
    labels:
      workload: app
    tags:
      nodegroup-role: app
    iam:
      withAddonPolicies:
        autoScaler: true
        ebs: true
        cloudWatch: true

addons:
  - name: vpc-cni
  - name: coredns
  - name: kube-proxy
  - name: aws-ebs-csi-driver
  - name: eks-pod-identity-agent

cloudWatch:
  clusterLogging:
    enableTypes: ["api", "audit", "authenticator", "controllerManager", "scheduler"]