apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: backend-sa
      containers:
        - name: backend
          image: 153860374757.dkr.ecr.ap-southeast-1.amazonaws.com/student-timetable-backend:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: backend-env
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-env
                  key: JWT_SECRET
            - name: NODE_ENV
              valueFrom:
                secretKeyRef:
                  name: backend-env
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                secretKeyRef:
                  name: backend-env
                  key: PORT
            - name: CORS_ORIGIN
              valueFrom:
                secretKeyRef:
                  name: backend-env
                  key: CORS_ORIGIN
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: backend-env
                  key: AWS_REGION
            - name: NOTIFICATION_LAMBDA_NAME
              valueFrom:
                secretKeyRef:
                  name: backend-env
                  key: NOTIFICATION_LAMBDA_NAME
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5