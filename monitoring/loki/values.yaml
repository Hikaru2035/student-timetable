deploymentMode: SingleBinary

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1
    path_prefix: /tmp/loki

  storage:
    type: filesystem
    filesystem:
      chunks_directory: /tmp/loki/chunks
      rules_directory: /tmp/loki/rules
    bucketNames:
      chunks: dummy
      ruler: dummy
      admin: dummy

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  limits_config:
    retention_period: 168h

  compactor:
    working_directory: /tmp/loki/compactor
    retention_enabled: true
    delete_request_store: filesystem

  rulerConfig:
    wal:
      dir: /tmp/loki/ruler-wal
    storage:
      type: local
      local:
        directory: /tmp/loki/rules

singleBinary:
  replicas: 1
  persistence:
    enabled: false

gateway:
  enabled: true

chunksCache:
  enabled: false

resultsCache:
  enabled: false

backend:
  replicas: 0

read:
  replicas: 0

write:
  replicas: 0

lokiCanary:
  enabled: false

test:
  enabled: false

monitoring:
  dashboards:
    enabled: false
  rules:
    enabled: false
  serviceMonitor:
    enabled: false
