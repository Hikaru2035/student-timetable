name: CI Pipeline

on:
  push:
    branches:
      - 1.3.8-cicd-completed
  pull_request:
    branches:
      - 1.3.8-cicd-completed

env:
  VERSION: ${{ github.sha }}

jobs:
  backend:
    name: Backend Install
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install backend deps
        working-directory: backend
        run: npm ci

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Docker compose build
        run: docker compose -f docker-compose.ci.yaml build

      - name: Docker compose push
        run: docker compose -f docker-compose.ci.yaml push

      - name: Trigger Jenkins Deploy
        if: github.ref == 'refs/heads/1.3.8-cicd-completed'
        run: |
          curl -X POST \
          "${{ secrets.JENKINS_URL }}/job/deploy/buildWithParameters?VERSION=${{ github.sha }}" \
          --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_TOKEN }}"
