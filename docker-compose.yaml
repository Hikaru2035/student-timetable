services:
  frontend:
    build: ./frontend
    volumes:
      - frontend-static:/dist
    command: sh -c "cp -r /usr/src/app/dist/* /dist/"
    expose:
      - "80"

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
    expose:
      - "3000"

  postgres:
    image: postgres:16
    env_file:
      - ./backend/postgre.env
    volumes:
      - postgres-data:/var/lib/postgresql/data

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend-static:/usr/share/nginx/html:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres-data:
  frontend-static: