version: '3.9'
services:
  frontend:
    build: ./frontend
    restart: always
    command: npm run dev -- --host
    ports:
      - "8080:5173"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend

  backend:  
    build: ./backend
    restart: always
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
    ports:
      - "3000:3000"

  postgres:
    image: postgres:16
    restart: always
    env_file:
      - ./backend/postgre.env
    volumes:
      - postgres-data:/var/lib/postgresql/data
      
volumes:
  postgres-data:
